<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'MovieApp/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <h1>Login</h1>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Log in</button>
        </form>
        <p class="helper">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</body>
</html>
