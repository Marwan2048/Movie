{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Leave a Review</title>
    <link rel="stylesheet" href="{% static 'MovieApp/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h2 class="site-title">Movies</h2>
            <nav class="site-nav">
                {% if user.is_authenticated %}
                        <span class="greet">Hi, {{ user.username }}</span>
                        <form method="post" action="{% url 'logout' %}" class="logout-form" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn small">Logout</button>
                        </form>
                    {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <div class="movie-detail-page container">
        <div class="comment-form" style="max-width: 600px; margin: 32px auto;">
            <h3>Leave a Review</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div style="margin-top:16px;">
                    <button type="submit" class="btn">Submit Review</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
